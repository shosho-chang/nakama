name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg (required by shared/audio_clip + transcriber + script_video pipeline)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install video/ subproject deps
        run: npm install --prefix video

      - name: Build video/ TS parser
        run: npm run build --prefix video

      - name: Run video/ vitest
        run: npm test --prefix video

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests with coverage
        run: pytest --cov=shared --cov=thousand_sunny --cov=agents --cov-report=json:coverage.json --cov-report=term

      - name: Critical-path coverage gate
        run: python scripts/check_critical_path_coverage.py
