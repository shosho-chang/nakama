[project]
name = "nakama"
version = "0.4.1"
description = "AI Agent team for Health & Wellness / Longevity content creators"
requires-python = ">=3.11"
authors = [
    { name = "shosho-chang" },
]

dependencies = [
    # Core
    "anthropic>=0.42.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",

    # Web & API
    "httpx>=0.27.0",
    "feedparser>=6.0",

    # Utilities
    "python-dateutil>=2.9",
    "psutil>=5.9.0",

    # Web UI (Robin)
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4.0",
    "pre-commit>=3.7.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
