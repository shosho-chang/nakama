[project]
name = "nakama"
version = "0.4.1"
description = "AI Agent team for Health & Wellness / Longevity content creators"
requires-python = ">=3.11"
authors = [
    { name = "shosho-chang" },
]

dependencies = [
    # Core
    "anthropic>=0.42.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",

    # Web & API
    "httpx>=0.27.0",
    "feedparser>=6.0",

    # Transcription (post-processing only; openlrc in optional deps)
    "opencc-python-reimplemented>=0.1.7",

    # Utilities
    "python-dateutil>=2.9",
    "psutil>=5.9.0",

    # Web UI (Thousand Sunny)
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.9",

    # Slack Gateway
    "slack-bolt>=1.18.0",
    "slack-sdk>=3.27.0",
]

[project.optional-dependencies]
transcription = [
    # openlrc 鎖 anthropic<0.40，與主依賴 anthropic>=0.42 衝突
    # 安裝方式：pip install openlrc --no-deps && pip install faster-whisper ctranslate2
    # 我們只用 openlrc 的 ASR pipeline（skip_trans=True），不觸碰其 anthropic 依賴
    "faster-whisper>=1.0.0",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4.0",
    "pre-commit>=3.7.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["agents*", "shared*", "thousand_sunny*", "gateway*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
