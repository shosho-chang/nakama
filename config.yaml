vault_path: /home/Shosho LifeOS
db_path: /home/nakama/data/state.db

notification:
  method: email
  # SMTP credentials in .env

agents:
  robin:
    description: "Knowledge Base — 攝入來源、產出摘要、維護 Wiki"
    inbox_path: Inbox/kb
    trigger: manual  # Web UI 觸發，不走 cron（cron 會繞過 review 流程）
    style_profile: config/style-profile.json

  nami:
    description: "Secretary — Morning Brief、頻道數據追蹤、邀約報價回覆"
    schedule: "0 7 * * *"
    brief_path: AgentBriefs
    metrics_schedule: "0 9 * * 1"  # 每週一早上彙整數據
    pricing_config: config/nami-pricing.yaml

  zoro:
    description: "Scout — 追蹤 KOL、趨勢、PubMed、關鍵字研究"
    schedule: "0 6 * * *"
    sources:
      twitter:
        api_version: v2
        kol_list: config/kol-twitter.yaml
      pubmed:
        rss_feeds: config/pubmed-feeds.yaml
      google_trends:
        keywords: [longevity, biohacking, 身心健康, healthspan]

  usopp:
    description: "Publisher — 精準發布內容至各平台、電子報管理（Fluent CRM）"
    trigger: on_approve
    newsletter:
      name: 張秀秀的自由之路
      crm: fluent_crm
      # API key in .env

  sanji:
    description: "Community Manager — 自由艦隊社群營運、監控、活動策劃（Fluent Community）"
    schedule: "0 * * * *"  # 監控每小時
    wordpress:
      community: fluent_community
      alert_threshold:
        unanswered_hours: 24

  franky:
    description: "Engineer — 工程進度追蹤、系統健康檢查、套件更新監測"
    schedule: "0 1 * * 1"  # 每週一 01:00（週報在 Shosho 起床前產出）
    watch_configs:
      - config/franky-watch-mempalace.yaml

  brook:
    description: "Composer — 素材重組為各平台格式，交由 Usopp 發布"
    trigger: manual
    style_profile: config/style-profile.json

local_llm:
  base_url: "http://localhost:8080/v1"
  model: "qwen3.6-35b-a3b"
  timeout: 900  # 本地推理 timeout（秒）；Qwen partial offload 單 chunk 可達 4-5 分鐘，預設 15 分鐘

gateway:
  slack:
    channels:
      main: ""      # #nakama channel ID (e.g. C0123456789)
      nami: ""      # #nami channel ID
      zoro: ""      # #zoro channel ID
      robin: ""     # #robin channel ID
      franky: ""    # #franky channel ID
      brook: ""     # #brook channel ID
    cost_limit:
      daily_haiku_calls: 200
      warn_at: 150
    event_bridge:
      poll_interval_seconds: 5
      enabled: true
