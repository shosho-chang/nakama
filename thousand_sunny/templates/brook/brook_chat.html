<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brook · 文章助手</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #fafaf8;
    --bg-card: white;
    --text: #333;
    --text-heading: #1a1a1a;
    --text-muted: #888;
    --border: #e5e5e5;
    --accent: #6c63ff;
    --accent-hover: #574fd6;
    --msg-user: #e8e5ff;
    --msg-assistant: var(--bg-card);
  }
  body.dark {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --text: #d4d4d4;
    --text-heading: #e8e8e8;
    --text-muted: #888;
    --border: #2a2a4a;
    --accent: #8b80ff;
    --accent-hover: #a59bff;
    --msg-user: #2a2550;
    --msg-assistant: #1e2a45;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    background: var(--bg-card);
    padding: 0.6rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-left h1 { font-size: 1rem; color: var(--text-heading); }
  .header-right { display: flex; gap: 0.5rem; }
  .header-right button, .header-right a {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: none;
  }
  .header-right button:hover, .header-right a:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Main layout */
  .main-container {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--bg-card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: margin-left 0.3s;
  }
  .sidebar.hidden { margin-left: -260px; }
  .sidebar-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-header h2 { font-size: 0.85rem; color: var(--text-heading); }
  .new-chat-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 0.3rem 0.6rem;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .new-chat-btn:hover { background: var(--accent-hover); }
  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .conv-item {
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 0.3rem;
    transition: background 0.15s;
  }
  .conv-item:hover { background: var(--bg); }
  .conv-item.active { background: var(--msg-user); }
  .conv-item-topic {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-heading);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .conv-item-meta {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .message {
    max-width: 80%;
    padding: 0.8rem 1rem;
    border-radius: 12px;
    line-height: 1.65;
    font-size: 0.9rem;
  }
  .message.user {
    align-self: flex-end;
    background: var(--msg-user);
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start;
    background: var(--msg-assistant);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* Markdown inside assistant messages */
  .message.assistant h1, .message.assistant h2, .message.assistant h3 {
    margin: 0.8rem 0 0.4rem;
    color: var(--text-heading);
  }
  .message.assistant h1 { font-size: 1.1rem; }
  .message.assistant h2 { font-size: 1rem; }
  .message.assistant h3 { font-size: 0.92rem; }
  .message.assistant p { margin: 0.4rem 0; }
  .message.assistant ul, .message.assistant ol { margin: 0.4rem 0 0.4rem 1.2rem; }
  .message.assistant li { margin: 0.2rem 0; }
  .message.assistant code {
    background: var(--bg);
    padding: 0.15rem 0.35rem;
    border-radius: 3px;
    font-size: 0.85em;
  }
  .message.assistant pre {
    background: var(--bg);
    padding: 0.8rem;
    border-radius: 6px;
    overflow-x: auto;
    margin: 0.5rem 0;
  }
  .message.assistant pre code { background: none; padding: 0; }
  .message.assistant strong { color: var(--text-heading); }
  .message.assistant blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 0.8rem;
    color: var(--text-muted);
    margin: 0.5rem 0;
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    padding: 0.8rem 1rem;
    background: var(--msg-assistant);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    display: none;
  }
  .typing.visible { display: flex; gap: 0.3rem; align-items: center; }
  .typing span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Start form (shown when no conversation) */
  .start-form {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 1.5rem;
  }
  .start-form h2 {
    font-size: 1.4rem;
    color: var(--text-heading);
  }
  .start-form p { color: var(--text-muted); font-size: 0.9rem; }
  .start-input-group {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .start-input-group input[type="text"] {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    background: var(--bg-card);
    color: var(--text);
    outline: none;
  }
  .start-input-group input:focus { border-color: var(--accent); }
  .start-options {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .start-options label {
    font-size: 0.85rem;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .start-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.5rem;
    font-size: 0.95rem;
    cursor: pointer;
    align-self: flex-end;
  }
  .start-btn:hover { background: var(--accent-hover); }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Input bar */
  .input-bar {
    padding: 0.8rem 1rem;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    display: none;
    gap: 0.5rem;
    align-items: flex-end;
  }
  .input-bar.visible { display: flex; }
  .input-bar textarea {
    flex: 1;
    resize: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.8rem;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    min-height: 40px;
    max-height: 150px;
    overflow-y: auto;
  }
  .input-bar textarea:focus { border-color: var(--accent); }
  .send-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* Export modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--bg-card);
    border-radius: 12px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-size: 1rem; }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: var(--text-muted);
  }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.2rem;
    font-size: 0.9rem;
    line-height: 1.7;
  }
  .modal-footer {
    padding: 0.8rem 1.2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
  }
  .modal-footer button {
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .copy-btn { background: var(--accent); color: white; border: none; }
  .copy-btn:hover { background: var(--accent-hover); }
  .close-modal-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Brook · 文章助手</h1>
  </div>
  <div class="header-right">
    <button id="toggleSidebar">History</button>
    <button id="exportBtn" style="display:none;">Export</button>
    <button id="themeBtn">Dark</button>
    <a href="/">Robin</a>
  </div>
</div>

<div class="main-container">
  <!-- Sidebar -->
  <div class="sidebar hidden" id="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <button class="new-chat-btn" id="newChatBtn">+ New</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- Chat area -->
  <div class="chat-area" id="chatArea">
    <!-- Start form (visible initially) -->
    <div class="start-form" id="startForm">
      <h2>Brook</h2>
      <p>Tell me your topic. I'll help you write it step by step.</p>
      <div class="start-input-group">
        <input type="text" id="topicInput" placeholder="Article topic...">
        <div class="start-options">
          <label><input type="checkbox" id="kbCheck"> Search KB for materials</label>
        </div>
        <button class="start-btn" id="startBtn">Start Writing</button>
      </div>
    </div>

    <!-- Messages (hidden initially) -->
    <div class="messages" id="messages" style="display:none;"></div>
    <div class="typing" id="typing"><span></span><span></span><span></span></div>

    <!-- Input bar (hidden initially) -->
    <div class="input-bar" id="inputBar">
      <textarea id="msgInput" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3>Article Draft</h3>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="copy-btn" id="copyBtn">Copy</button>
      <button class="close-modal-btn" id="closeModalBtn">Close</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let conversationId = null;
let sending = false;

const $ = id => document.getElementById(id);

// --- Theme ---
const themeBtn = $('themeBtn');
if (localStorage.getItem('brook-dark') === '1') {
  document.body.classList.add('dark');
  themeBtn.textContent = 'Light';
}
themeBtn.onclick = () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  themeBtn.textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('brook-dark', isDark ? '1' : '0');
};

// --- Sidebar ---
const sidebar = $('sidebar');
$('toggleSidebar').onclick = () => {
  sidebar.classList.toggle('hidden');
  if (!sidebar.classList.contains('hidden')) loadConversations();
};
$('newChatBtn').onclick = () => {
  conversationId = null;
  showStartForm();
};

// --- Markdown ---
marked.setOptions({ breaks: true, gfm: true });

function renderMd(text) {
  return marked.parse(text);
}

// --- UI helpers ---
function showStartForm() {
  $('startForm').style.display = '';
  $('messages').style.display = 'none';
  $('messages').innerHTML = '';
  $('inputBar').classList.remove('visible');
  $('exportBtn').style.display = 'none';
  $('topicInput').value = '';
  $('topicInput').focus();
}

function showChat() {
  $('startForm').style.display = 'none';
  $('messages').style.display = '';
  $('inputBar').classList.add('visible');
  $('exportBtn').style.display = '';
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  if (role === 'assistant') {
    div.innerHTML = renderMd(content);
  } else {
    div.textContent = content;
  }
  $('messages').appendChild(div);
  scrollToBottom();
}

function scrollToBottom() {
  const m = $('messages');
  m.scrollTop = m.scrollHeight;
}

function showTyping(show) {
  $('typing').classList.toggle('visible', show);
  if (show) scrollToBottom();
}

function setInputEnabled(enabled) {
  $('msgInput').disabled = !enabled;
  $('sendBtn').disabled = !enabled;
  sending = !enabled;
}

// --- Auto-resize textarea ---
const msgInput = $('msgInput');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + 'px';
});

// --- Start conversation ---
$('startBtn').onclick = startConversation;
$('topicInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startConversation();
  }
});

async function startConversation() {
  const topic = $('topicInput').value.trim();
  if (!topic) return;

  $('startBtn').disabled = true;
  $('startBtn').textContent = 'Brook is thinking...';

  const body = new URLSearchParams({ topic });
  if ($('kbCheck').checked) body.set('kb_query', topic);

  try {
    const resp = await fetch('/brook/start', { method: 'POST', body });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    conversationId = data.conversation_id;
    showChat();
    // Show the initial user message (topic)
    addMessage('user', topic);
    addMessage('assistant', data.message);
    msgInput.focus();

    // Update sidebar if open
    if (!sidebar.classList.contains('hidden')) loadConversations();
  } catch (e) {
    alert('Error: ' + e.message);
  } finally {
    $('startBtn').disabled = false;
    $('startBtn').textContent = 'Start Writing';
  }
}

// --- Send message ---
$('sendBtn').onclick = sendMessage;
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  if (sending || !conversationId) return;
  const text = msgInput.value.trim();
  if (!text) return;

  setInputEnabled(false);
  msgInput.value = '';
  msgInput.style.height = 'auto';

  addMessage('user', text);
  showTyping(true);

  try {
    const resp = await fetch('/brook/message', {
      method: 'POST',
      body: new URLSearchParams({ conversation_id: conversationId, message: text }),
    });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    showTyping(false);
    addMessage('assistant', data.message);
  } catch (e) {
    showTyping(false);
    addMessage('assistant', 'Error: ' + e.message);
  } finally {
    setInputEnabled(true);
    msgInput.focus();
  }
}

// --- Load conversations list ---
async function loadConversations() {
  try {
    const resp = await fetch('/brook/conversations');
    if (!resp.ok) return;
    const data = await resp.json();

    const list = $('convList');
    list.innerHTML = '';

    for (const conv of data.conversations) {
      const item = document.createElement('div');
      item.className = 'conv-item' + (conv.id === conversationId ? ' active' : '');

      const topic = document.createElement('div');
      topic.className = 'conv-item-topic';
      topic.textContent = conv.topic;

      const meta = document.createElement('div');
      meta.className = 'conv-item-meta';
      const date = new Date(conv.updated_at);
      meta.textContent = conv.phase + ' · ' + date.toLocaleDateString('zh-TW');

      item.appendChild(topic);
      item.appendChild(meta);
      item.onclick = () => loadConversation(conv.id);
      list.appendChild(item);
    }
  } catch (e) {
    console.error('Failed to load conversations', e);
  }
}

// --- Load a specific conversation ---
async function loadConversation(id) {
  try {
    const resp = await fetch('/brook/conversation/' + id);
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();

    conversationId = id;
    showChat();
    $('messages').innerHTML = '';

    for (const msg of data.messages) {
      addMessage(msg.role, msg.content);
    }

    // Highlight active in sidebar
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
    const items = $('convList').children;
    for (const item of items) {
      if (item.querySelector('.conv-item-topic')?.textContent === data.topic) {
        item.classList.add('active');
      }
    }

    msgInput.focus();
  } catch (e) {
    alert('Failed to load conversation: ' + e.message);
  }
}

// --- Export ---
$('exportBtn').onclick = async () => {
  if (!conversationId) return;

  $('exportBtn').disabled = true;
  $('exportBtn').textContent = 'Exporting...';

  try {
    const resp = await fetch('/brook/export/' + conversationId, { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();

    $('modalBody').innerHTML = renderMd(data.draft);
    $('modalOverlay').classList.add('visible');
    // Store raw text for copy
    $('modalBody').dataset.raw = data.draft;
  } catch (e) {
    alert('Export failed: ' + e.message);
  } finally {
    $('exportBtn').disabled = false;
    $('exportBtn').textContent = 'Export';
  }
};

// --- Modal ---
$('modalClose').onclick = () => $('modalOverlay').classList.remove('visible');
$('closeModalBtn').onclick = () => $('modalOverlay').classList.remove('visible');
$('modalOverlay').onclick = e => {
  if (e.target === $('modalOverlay')) $('modalOverlay').classList.remove('visible');
};
$('copyBtn').onclick = () => {
  const raw = $('modalBody').dataset.raw || $('modalBody').innerText;
  navigator.clipboard.writeText(raw).then(() => {
    $('copyBtn').textContent = 'Copied!';
    setTimeout(() => $('copyBtn').textContent = 'Copy', 2000);
  });
};

// --- Check URL params for resume ---
const params = new URLSearchParams(location.search);
const resumeId = params.get('conversation_id');
if (resumeId) {
  loadConversation(resumeId);
}

// Focus topic input on load
if (!resumeId) $('topicInput').focus();
</script>
</body>
</html>
