<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin · 上傳新書</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
  .header { max-width: 680px; margin: 0 auto 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .header h1 { font-size: 1.5rem; color: #1a1a1a; }
  .header h1 span { font-size: 1.5rem; margin-right: 0.5rem; }
  .nav { display: flex; gap: 0.75rem; align-items: center; font-size: 0.875rem; }
  .nav a { color: #6c63ff; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .nav a:hover, .nav a:focus-visible { border-color: #6c63ff; outline: none; }
  .nav a.active { color: #1a1a1a; font-weight: 600; }
  .container { max-width: 680px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.1rem; }
  .field label { font-size: 0.85rem; color: #444; font-weight: 600; }
  .field .hint { font-size: 0.75rem; color: #888; font-weight: 400; }
  .field input[type="text"], .field input[type="file"], .field select { padding: 0.55rem 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: inherit; outline: none; transition: border-color 0.15s; background: #fafafa; }
  .field input[type="text"]:focus, .field select:focus, .field input[type="file"]:focus { border-color: #6c63ff; background: white; }
  .field input[type="text"]:invalid:not(:placeholder-shown) { border-color: #c62828; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .row .field { flex: 1; min-width: 180px; margin-bottom: 0; }
  .actions { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.5rem; }
  .btn-cancel { padding: 0.55rem 1.2rem; background: transparent; color: #666; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; text-decoration: none; transition: background 0.15s, border-color 0.15s; }
  .btn-cancel:hover, .btn-cancel:focus-visible { background: #f0f0f0; border-color: #bbb; outline: none; }
  .btn-submit { padding: 0.55rem 1.2rem; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
  .btn-submit:hover, .btn-submit:focus-visible { background: #574fd6; outline: none; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header">
  <h1><span>📤</span>上傳新書</h1>
  <nav class="nav">
    <a href="/">📥 Inbox</a>
    <a href="/books">📚 書架</a>
  </nav>
</div>
<div class="container">
  <form class="card" method="post" action="/books/upload" enctype="multipart/form-data">
    <div class="field">
      <label for="book_id">書籍 ID <span class="hint">（檔名安全字串，不能含 / \ 或 ..）</span></label>
      <input type="text" id="book_id" name="book_id" required placeholder="how-to-live-1962" pattern="[A-Za-z0-9][A-Za-z0-9_-]*" maxlength="200">
    </div>

    <div class="field">
      <label for="title">標題 <span class="hint">（留白則用 EPUB metadata）</span></label>
      <input type="text" id="title" name="title" placeholder="如何活：蒙田的 20 個答案">
    </div>

    <div class="row">
      <div class="field">
        <label for="author">作者 <span class="hint">（留白則用 EPUB metadata）</span></label>
        <input type="text" id="author" name="author" placeholder="Sarah Bakewell">
      </div>
      <div class="field">
        <label for="lang_pair">語言對</label>
        <select id="lang_pair" name="lang_pair">
          <option value="en-zh" selected>en-zh（英 → 中）</option>
          <option value="zh-en">zh-en（中 → 英）</option>
          <option value="ja-zh">ja-zh（日 → 中）</option>
          <option value="fr-zh">fr-zh（法 → 中）</option>
        </select>
      </div>
      <div class="field">
        <label for="genre">類型 <span class="hint">（選填）</span></label>
        <input type="text" id="genre" name="genre" placeholder="popular_science">
      </div>
    </div>

    <div class="field">
      <label for="bilingual">雙語 EPUB <span class="hint">（必填）</span></label>
      <input type="file" id="bilingual" name="bilingual" accept=".epub,application/epub+zip" required>
    </div>

    <div class="field">
      <label for="original">原文 EPUB <span class="hint">（選填，僅用作對照）</span></label>
      <input type="file" id="original" name="original" accept=".epub,application/epub+zip">
    </div>

    <div class="actions">
      <a href="/books" class="btn-cancel">取消</a>
      <button type="submit" class="btn-submit">上傳</button>
    </div>
  </form>
</div>
</body>
</html>
