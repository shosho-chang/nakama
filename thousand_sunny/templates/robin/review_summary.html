<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin · 閱讀摘要</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 2rem; }
  .container { max-width: 760px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 1.25rem; color: #1a1a1a; }
  .header p { color: #666; font-size: 0.875rem; margin-top: 0.3rem; }
  .summary-box { background: white; border-radius: 12px; padding: 1.75rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); white-space: pre-wrap; font-size: 0.9rem; line-height: 1.7; color: #333; max-height: 60vh; overflow-y: auto; }
  .guidance-section { background: white; border-radius: 12px; padding: 1.75rem; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .guidance-section h2 { font-size: 1rem; color: #1a1a1a; margin-bottom: 0.5rem; }
  .guidance-section p { font-size: 0.875rem; color: #666; margin-bottom: 1rem; }
  textarea { width: 100%; padding: 0.75rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.9rem; resize: vertical; min-height: 90px; outline: none; transition: border-color .2s; font-family: inherit; }
  textarea:focus { border-color: #6c63ff; }
  .actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .btn-primary { padding: 0.7rem 1.75rem; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: #574fd6; }
  .btn-skip { padding: 0.7rem 1.25rem; background: transparent; color: #888; border: 1.5px solid #ddd; border-radius: 8px; font-size: 0.95rem; cursor: pointer; transition: all .2s; }
  .btn-skip:hover { border-color: #aaa; color: #555; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📝 Source Summary</h1>
    <p>{{ file_name }}</p>
  </div>

  <div class="summary-box">{{ summary }}</div>

  <div class="guidance-section">
    <h2>引導方向（選填）</h2>
    <p>閱讀摘要後，你可以告訴 Robin 想要強調的方向，或直接略過讓 Robin 自行判斷。</p>
    <form method="post" action="/submit-guidance" id="form">
      <textarea name="guidance" placeholder="例如：&#10;「重點放在 CBT-I 的臨床應用部分」&#10;「作者的研究背景和方法論很重要」&#10;「失眠與焦慮的關係要獨立建一頁」"></textarea>
      <div class="actions">
        <button type="submit" class="btn-primary">送出引導方向</button>
        <button type="submit" class="btn-skip" onclick="document.querySelector('textarea').value=''">略過，Robin 自行判斷</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
