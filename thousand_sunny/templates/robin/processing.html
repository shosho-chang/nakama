<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin · 處理中</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 12px; padding: 3rem 2.5rem; width: 100%; max-width: 440px; text-align: center; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  .spinner { width: 48px; height: 48px; border: 4px solid #eee; border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 1.1rem; color: #1a1a1a; margin-bottom: 0.75rem; }
  #status { color: #666; font-size: 0.9rem; min-height: 1.2em; }
  .error-msg { color: #e53e3e; font-size: 0.9rem; margin-top: 1rem; }
  .back-link { display: inline-block; margin-top: 1.5rem; color: #6c63ff; font-size: 0.875rem; text-decoration: none; }
  .cancel-btn { display: inline-block; margin-top: 1.5rem; padding: 0.4rem 1rem; background: transparent; color: #999; border: 1px solid #ddd; border-radius: 8px; font-size: 0.8rem; cursor: pointer; transition: all .2s; }
  .cancel-btn:hover { color: #e53e3e; border-color: #e53e3e; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <h2>{{ label }}</h2>
  <p id="status">連線中...</p>
  <div id="error" class="error-msg" style="display:none"></div>
  <a href="/" class="back-link" style="display:none" id="back">← 返回</a>
  <form method="post" action="/cancel" id="cancel-form" style="margin:0">
    <button type="submit" class="cancel-btn">取消</button>
  </form>
</div>
<script>
const sessionId = "{{ session_id }}";
const evtSource = new EventSource("/events/" + sessionId);

evtSource.addEventListener("status", function(e) {
  const data = JSON.parse(e.data);
  document.getElementById("status").textContent = data.msg;
});

evtSource.addEventListener("done", function(e) {
  evtSource.close();
  document.getElementById("cancel-form").style.display = "none";
  const data = JSON.parse(e.data);
  window.location.href = data.redirect;
});

evtSource.addEventListener("error", function(e) {
  evtSource.close();
  let msg = "發生錯誤，請重試";
  try { msg = JSON.parse(e.data).msg; } catch(err) {}
  document.getElementById("error").textContent = msg;
  document.getElementById("error").style.display = "block";
  document.getElementById("back").style.display = "inline-block";
  document.getElementById("cancel-form").style.display = "none";
  document.querySelector(".spinner").style.display = "none";
});

evtSource.onerror = function() {
  document.getElementById("status").textContent = "連線中斷，等待重連...";
};
</script>
</body>
</html>
