# Nakama Agent 排程（參考用，手動加入 crontab -e）
#
# 時區：VPS 本機 TZ 是 Asia/Taipei，所以這裡寫的時間就是台北時間。
# 若 VPS 改 UTC 要全部加 8 小時。確認方式：`timedatectl` 看 Time zone。
#
# 使用方式：
#   crontab -e
#   貼上以下內容（調整路徑）

# Robin — Inbox KB ingest（每天台北 02:00）
0 2 * * *  cd /home/nakama && /usr/bin/python3 -m agents.robin >> /var/log/nakama/robin.log 2>&1

# Robin — PubMed 每日 digest（每天台北 05:30，修修起床前產出）
30 5 * * *  cd /home/nakama && /usr/bin/python3 -m agents.robin --mode pubmed_digest >> /var/log/nakama/robin_pubmed.log 2>&1

# Zoro — Scout（每天台北 06:00）
0 6 * * *  cd /home/nakama && /usr/bin/python3 -m agents.zoro >> /var/log/nakama/zoro.log 2>&1

# Nami — Secretary / Morning Brief（每天台北 07:00）
0 7 * * *  cd /home/nakama && /usr/bin/python3 -m agents.nami >> /var/log/nakama/nami.log 2>&1

# Usopp — Community Monitor（每小時）
0 * * * *  cd /home/nakama && /usr/bin/python3 -m agents.usopp >> /var/log/nakama/usopp.log 2>&1

# Franky — 工程週報（每週一台北 01:00）
0 1 * * 1  cd /home/nakama && /usr/bin/python3 -m agents.franky >> /var/log/nakama/franky.log 2>&1
