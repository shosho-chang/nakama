# Nakama Agent 排程（參考用，手動加入 crontab -e）
#
# 時區：VPS 本機 TZ 是 Asia/Taipei，所以這裡寫的時間就是台北時間。
# 若 VPS 改 UTC 要全部加 8 小時。確認方式：`timedatectl` 看 Time zone。
#
# 使用方式：
#   crontab -e
#   貼上以下內容（調整路徑）

# Robin — Inbox KB ingest（每天台北 02:00）
0 2 * * *  cd /home/nakama && /usr/bin/python3 -m agents.robin >> /var/log/nakama/robin.log 2>&1

# Robin — PubMed 每日 digest（每天台北 05:30，修修起床前產出）
30 5 * * *  cd /home/nakama && /usr/bin/python3 -m agents.robin --mode pubmed_digest >> /var/log/nakama/robin_pubmed.log 2>&1

# Zoro — Brainstorm Scout（每天台北 05:00；依 memory project_multi_model_architecture.md 凍結的時間）
0 5 * * *  cd /home/nakama && /usr/bin/python3 -m agents.zoro scout >> /var/log/nakama/zoro-scout.log 2>&1

# Nami — Secretary / Morning Brief（每天台北 07:00）— DISABLED 2026-05-03
# `agents.nami` __main__ stub raises NotImplementedError (morning brief 未實作)。
# 真實 Nami 邏輯走 nakama-gateway service（gateway/handlers/nami.py），由 Slack DM 觸發。
# 未來真做 morning brief 時 unblock 這條（同時實作 agents/nami/__main__.py.run）。
# 0 7 * * *  cd /home/nakama && /usr/bin/python3 -m agents.nami >> /var/log/nakama/nami.log 2>&1

# Usopp — Community Monitor（每小時）
0 * * * *  cd /home/nakama && /usr/bin/python3 -m agents.usopp >> /var/log/nakama/usopp.log 2>&1

# Franky Slice 1 — Health probes（每 5 分鐘）
*/5 * * * *  cd /home/nakama && /usr/bin/python3 -m agents.franky health >> /var/log/nakama/franky-health.log 2>&1

# Franky Slice 2 — R2 backup verify（每天台北 03:30）
30 3 * * *  cd /home/nakama && /usr/bin/python3 -m agents.franky backup-verify >> /var/log/nakama/franky-backup.log 2>&1

# Franky Slice 3 — 週報（每週一台北 10:00）
0 10 * * 1  cd /home/nakama && /usr/bin/python3 -m agents.franky digest >> /var/log/nakama/franky-digest.log 2>&1

# Franky AI news digest — 每天台北 06:30（Nami 07:00 morning brief 之前）
30 6 * * *  cd /home/nakama && /usr/bin/python3 -m agents.franky news >> /var/log/nakama/franky-news.log 2>&1

# Nakama self-backup — state.db daily snapshot → R2 nakama-backup bucket（每天台北 04:00）
0 4 * * *  cd /home/nakama && /usr/bin/python3 scripts/backup_nakama_state.py >> /var/log/nakama/nakama-backup.log 2>&1

# Franky Phase 5B-3 — Anomaly daemon（每 15 分鐘 — cost / latency / error rate / cron cluster 3σ）
*/15 * * * *  cd /home/nakama && /usr/bin/python3 -m agents.franky anomaly >> /var/log/nakama/anomaly-daemon.log 2>&1

# Franky Slice 8 — GSC daily（每天台北 03:00；ADR-008 Phase 2a-min）
0 3 * * *  cd /home/nakama && /usr/bin/python3 -m agents.franky gsc-daily >> /var/log/nakama/franky-gsc-daily.log 2>&1
