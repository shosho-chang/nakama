# Nakama Agent 排程（參考用，手動加入 crontab -e）
#
# 使用方式：
#   crontab -e
#   貼上以下內容（調整路徑）

# Robin — Knowledge Base（每天 02:00）
0 2 * * *  cd /home/agents/nakama && /usr/bin/python3 -m agents.robin >> /var/log/nakama/robin.log 2>&1

# Robin — PubMed 每日 digest（UTC 21:30 = 台北 05:30，修修起床前產出）
30 21 * * *  cd /home/agents/nakama && /usr/bin/python3 -m agents.robin --mode pubmed_digest >> /var/log/nakama/robin_pubmed.log 2>&1

# Zoro — Scout（每天 06:00）
0 6 * * *  cd /home/agents/nakama && /usr/bin/python3 -m agents.zoro >> /var/log/nakama/zoro.log 2>&1

# Nami — Secretary / Morning Brief（每天 07:00）
0 7 * * *  cd /home/agents/nakama && /usr/bin/python3 -m agents.nami >> /var/log/nakama/nami.log 2>&1

# Usopp — Community Monitor（每小時）
0 * * * *  cd /home/agents/nakama && /usr/bin/python3 -m agents.usopp >> /var/log/nakama/usopp.log 2>&1

# Franky — 工程週報（每週一 01:00，在 Shosho 起床前產出）
0 1 * * 1  cd /home/agents/nakama && /usr/bin/python3 -m agents.franky >> /var/log/nakama/franky.log 2>&1
