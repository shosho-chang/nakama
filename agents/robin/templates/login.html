<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin · 登入</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 380px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
  .logo { font-size: 2rem; text-align: center; margin-bottom: 0.5rem; }
  h1 { text-align: center; font-size: 1.25rem; color: #1a1a1a; margin-bottom: 2rem; }
  label { display: block; font-size: 0.875rem; color: #555; margin-bottom: 0.4rem; }
  input[type=password] { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color .2s; }
  input[type=password]:focus { border-color: #6c63ff; }
  button { width: 100%; margin-top: 1.2rem; padding: 0.75rem; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background .2s; }
  button:hover { background: #574fd6; }
  .error { color: #e53e3e; font-size: 0.875rem; margin-top: 0.75rem; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏴‍☠️</div>
  <h1>Robin · 知識庫</h1>
  <form method="post" action="/login">
    <label for="password">密碼</label>
    <input type="password" id="password" name="password" autofocus placeholder="輸入密碼">
    <button type="submit">進入</button>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </form>
</div>
</body>
</html>
