<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin · 閱讀</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fafaf8; height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header { background: white; padding: 0.6rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e5e5; flex-shrink: 0; }
  .header-left { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
  .header-left h1 { font-size: 1rem; color: #1a1a1a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .header-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
  .badge-read { font-size: 0.65rem; padding: 0.1rem 0.45rem; border-radius: 999px; background: #e8f5e9; color: #2e7d32; font-weight: 600; }
  .save-indicator { font-size: 0.75rem; color: #4caf50; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.show { opacity: 1; }
  .mode-toggle { font-size: 0.75rem; padding: 0.25rem 0.6rem; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; cursor: pointer; color: #555; }
  .mode-toggle:hover { border-color: #6c63ff; color: #6c63ff; }
  .shortcuts-hint { font-size: 0.7rem; color: #aaa; }

  /* ── Reader area ── */
  .reader-wrap { flex: 1; overflow: hidden; position: relative; }

  /* Scroll mode */
  .reader-content { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
  .reader-wrap.scroll-mode { overflow-y: auto; }
  .reader-wrap.scroll-mode .reader-content { /* default behavior */ }

  /* Paged mode */
  .reader-wrap.paged-mode { overflow: hidden; }
  .reader-wrap.paged-mode .reader-content {
    max-width: none;
    height: 100%;
    padding: 2rem 3rem;
    column-fill: auto;
    column-gap: 3rem;
  }
  .page-nav { display: none; position: absolute; bottom: 0.75rem; left: 50%; transform: translateX(-50%); font-size: 0.8rem; color: #888; background: rgba(255,255,255,0.9); padding: 0.25rem 0.75rem; border-radius: 6px; }
  .reader-wrap.paged-mode .page-nav { display: block; }

  /* ── Content typography ── */
  .reader-content h1 { font-size: 1.6rem; margin: 1.5rem 0 0.75rem; color: #1a1a1a; line-height: 1.4; }
  .reader-content h2 { font-size: 1.3rem; margin: 1.5rem 0 0.6rem; color: #1a1a1a; }
  .reader-content h3 { font-size: 1.1rem; margin: 1.2rem 0 0.5rem; color: #1a1a1a; }
  .reader-content p { margin-bottom: 0.9rem; line-height: 1.9; color: #333; font-size: 1rem; }
  .reader-content ul, .reader-content ol { margin: 0.5rem 0 0.9rem 1.5rem; line-height: 1.8; }
  .reader-content li { margin-bottom: 0.3rem; }
  .reader-content blockquote { border-left: 3px solid #ddd; padding-left: 1rem; color: #666; margin: 0.75rem 0; }
  .reader-content code { background: #f0f0f0; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.85em; }
  .reader-content pre { background: #f0f0f0; padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 0.75rem 0; }
  .reader-content pre code { background: none; padding: 0; }
  .reader-content img { max-width: 100%; border-radius: 8px; margin: 0.75rem 0; }
  .reader-content hr { border: none; border-top: 1px solid #e5e5e5; margin: 1.5rem 0; }

  /* Highlight */
  .reader-content mark { background: #fff3a3; padding: 0.05rem 0.15rem; border-radius: 2px; }

  /* Annotation callout */
  .reader-content .annotation-callout { border-left: 3px solid #6c63ff; background: #f3f2ff; padding: 0.75rem 1rem; border-radius: 0 6px 6px 0; margin: 0.75rem 0; font-size: 0.9rem; color: #444; }
  .reader-content .annotation-callout strong { color: #6c63ff; }

  /* ── Footer ── */
  .footer { background: white; padding: 0.6rem 1.5rem; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #e5e5e5; flex-shrink: 0; }
  .footer a { color: #888; text-decoration: none; font-size: 0.875rem; }
  .footer a:hover { color: #333; }
  .btn { padding: 0.5rem 1rem; border: none; border-radius: 8px; font-size: 0.875rem; cursor: pointer; transition: background 0.2s; }
  .btn-finish { background: #4caf50; color: white; }
  .btn-finish:hover { background: #43a047; }
  .btn-finish.done { background: #e8f5e9; color: #2e7d32; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal h3 { font-size: 1rem; color: #1a1a1a; margin-bottom: 0.75rem; }
  .modal-context { font-size: 0.85rem; color: #666; background: #f9f9f9; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 0.75rem; max-height: 80px; overflow-y: auto; border-left: 3px solid #fff3a3; }
  .modal textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 8px; padding: 0.75rem; font-family: system-ui, sans-serif; font-size: 0.9rem; resize: vertical; outline: none; }
  .modal textarea:focus { border-color: #6c63ff; }
  .modal-hint { font-size: 0.7rem; color: #aaa; margin-top: 0.35rem; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }
  .modal-actions button { padding: 0.45rem 1rem; border-radius: 8px; font-size: 0.85rem; cursor: pointer; border: none; }
  .modal-cancel { background: #f0f0f0; color: #666; }
  .modal-cancel:hover { background: #e5e5e5; }
  .modal-confirm { background: #6c63ff; color: white; }
  .modal-confirm:hover { background: #574fd6; }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>{{ filename }}</h1>
      <span class="badge-read" id="readBadge" {% if not is_read %}style="display:none"{% endif %}>已閱讀</span>
    </div>
    <div class="header-right">
      <span class="shortcuts-hint">Ctrl+B 標記 · Ctrl+Shift+C 註解</span>
      <span class="save-indicator" id="saveIndicator">已儲存</span>
      <button class="mode-toggle" id="modeToggle" onclick="toggleMode()">翻頁模式</button>
    </div>
  </div>

  <!-- Reader -->
  <div class="reader-wrap scroll-mode" id="readerWrap">
    <div class="reader-content" id="readerContent"></div>
    <div class="page-nav" id="pageNav"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="/">← 返回 Inbox</a>
    <button class="btn btn-finish {% if is_read %}done{% endif %}" id="finishBtn" onclick="finishReading()">
      {% if is_read %}已完成閱讀 ✓{% else %}完成閱讀{% endif %}
    </button>
  </div>

  <!-- Annotation Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>新增註解</h3>
      <div class="modal-context" id="modalContext"></div>
      <textarea id="modalInput" placeholder="寫下你的想法或心得..."></textarea>
      <div class="modal-hint">Ctrl+Enter 確認</div>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">取消</button>
        <button class="modal-confirm" onclick="confirmAnnotation()">確認</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ──
    const FILENAME = '{{ filename }}';
    let mdSource = {{ content | tojson }};
    let isPaged = false;
    let currentPage = 0;
    let totalPages = 1;
    let pendingSelectedText = '';

    const readerWrap = document.getElementById('readerWrap');
    const readerContent = document.getElementById('readerContent');
    const pageNav = document.getElementById('pageNav');
    const modeToggle = document.getElementById('modeToggle');
    const saveIndicator = document.getElementById('saveIndicator');
    const finishBtn = document.getElementById('finishBtn');
    const readBadge = document.getElementById('readBadge');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContext = document.getElementById('modalContext');
    const modalInput = document.getElementById('modalInput');

    // ── Markdown preprocessing & rendering ──

    function preprocess(md) {
      md = md.replace(/==(.*?)==/gs, '<mark>$1</mark>');
      md = md.replace(
        /^> \[!annotation\]\s*\n((?:^> .*(?:\n|$))*)/gm,
        function(match, body) {
          const text = body.replace(/^> ?/gm, '').trim();
          return '<div class="annotation-callout"><strong>My Note</strong><br>' + text + '</div>\n';
        }
      );
      return md;
    }

    function render() {
      const processed = preprocess(mdSource);
      readerContent.innerHTML = marked.parse(processed);
      if (isPaged) updatePageInfo();
    }

    // ── Mode toggle ──

    function toggleMode() {
      isPaged = !isPaged;
      if (isPaged) {
        readerWrap.classList.remove('scroll-mode');
        readerWrap.classList.add('paged-mode');
        modeToggle.textContent = '捲動模式';
        currentPage = 0;
        applyPageLayout();
      } else {
        readerWrap.classList.remove('paged-mode');
        readerWrap.classList.add('scroll-mode');
        modeToggle.textContent = '翻頁模式';
        readerContent.style.columnWidth = '';
        readerContent.style.width = '';
        readerContent.style.transform = '';
      }
    }

    function applyPageLayout() {
      const wrapW = readerWrap.clientWidth;
      readerContent.style.columnWidth = wrapW + 'px';
      requestAnimationFrame(() => {
        const scrollW = readerContent.scrollWidth;
        totalPages = Math.max(1, Math.ceil(scrollW / wrapW));
        goToPage(currentPage);
      });
    }

    function goToPage(n) {
      const wrapW = readerWrap.clientWidth;
      currentPage = Math.max(0, Math.min(n, totalPages - 1));
      readerContent.style.transform = `translateX(-${currentPage * wrapW}px)`;
      updatePageInfo();
    }

    function updatePageInfo() {
      const wrapW = readerWrap.clientWidth;
      const scrollW = readerContent.scrollWidth;
      totalPages = Math.max(1, Math.ceil(scrollW / wrapW));
      pageNav.textContent = `${currentPage + 1} / ${totalPages}`;
    }

    // ── Text selection → markdown source mapping ──

    function getSelectedText() {
      const sel = window.getSelection();
      return sel ? sel.toString().trim() : '';
    }

    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function highlightInSource(text) {
      // Find the text in markdown source and wrap with ==...==
      // Use a flexible match that ignores minor whitespace differences
      const escaped = escapeRegex(text);
      const flexPattern = escaped.replace(/\s+/g, '\\s+');
      const regex = new RegExp(flexPattern);
      const match = mdSource.match(regex);
      if (match) {
        const idx = mdSource.indexOf(match[0]);
        mdSource = mdSource.substring(0, idx) + '==' + match[0] + '==' + mdSource.substring(idx + match[0].length);
        return true;
      }
      return false;
    }

    function addAnnotationInSource(text, note) {
      // Find the text in source, then insert annotation after the paragraph
      const escaped = escapeRegex(text);
      const flexPattern = escaped.replace(/\s+/g, '\\s+');
      const regex = new RegExp(flexPattern);
      const match = mdSource.match(regex);
      if (match) {
        const idx = mdSource.indexOf(match[0]);
        const afterMatch = idx + match[0].length;
        // Find end of current paragraph (next double newline or end)
        let paraEnd = mdSource.indexOf('\n\n', afterMatch);
        if (paraEnd === -1) paraEnd = mdSource.length;
        // Build annotation block
        const noteLines = note.split('\n').map(l => '> ' + l).join('\n');
        const block = '\n\n> [!annotation]\n' + noteLines + '\n';
        mdSource = mdSource.substring(0, paraEnd) + block + mdSource.substring(paraEnd);
        return true;
      }
      return false;
    }

    // ── Auto-save ──

    let saveTimer;
    function showSaved() {
      saveIndicator.classList.add('show');
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveIndicator.classList.remove('show'), 1500);
    }

    async function saveContent() {
      const form = new FormData();
      form.append('filename', FILENAME);
      form.append('content', mdSource);
      try {
        const res = await fetch('/save-annotations', { method: 'POST', body: form });
        if (res.ok) showSaved();
      } catch (e) {
        console.error('Save failed:', e);
      }
    }

    function saveAndRender() {
      render();
      saveContent();
    }

    // ── Keyboard shortcuts ──

    document.addEventListener('keydown', function(e) {
      // Ctrl+B: highlight
      if (e.ctrlKey && !e.shiftKey && e.key === 'b') {
        e.preventDefault();
        const text = getSelectedText();
        if (!text) return;
        if (highlightInSource(text)) {
          window.getSelection().removeAllRanges();
          saveAndRender();
        }
      }

      // Ctrl+Shift+C: annotation
      if (e.ctrlKey && e.shiftKey && e.key === 'C') {
        e.preventDefault();
        const text = getSelectedText();
        if (!text) return;
        pendingSelectedText = text;
        openModal(text);
      }

      // Arrow keys for paged mode
      if (isPaged && !modalOverlay.classList.contains('show')) {
        if (e.key === 'ArrowRight') { e.preventDefault(); goToPage(currentPage + 1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); goToPage(currentPage - 1); }
      }
    });

    // ── Modal ──

    function openModal(contextText) {
      modalContext.textContent = contextText;
      modalInput.value = '';
      modalOverlay.classList.add('show');
      setTimeout(() => modalInput.focus(), 100);
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
      pendingSelectedText = '';
    }

    function confirmAnnotation() {
      const note = modalInput.value.trim();
      if (!note) { closeModal(); return; }
      if (addAnnotationInSource(pendingSelectedText, note)) {
        window.getSelection().removeAllRanges();
        saveAndRender();
      }
      closeModal();
    }

    // Ctrl+Enter in modal to confirm
    modalInput.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        confirmAnnotation();
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        closeModal();
      }
    });

    // Close modal on overlay click
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) closeModal();
    });

    // ── Finish reading ──

    async function finishReading() {
      await saveContent();
      const form = new FormData();
      form.append('filename', FILENAME);
      try {
        const res = await fetch('/mark-read', { method: 'POST', body: form });
        if (res.ok) {
          finishBtn.textContent = '已完成閱讀 ✓';
          finishBtn.classList.add('done');
          readBadge.style.display = '';
        }
      } catch (e) {
        console.error('Mark read failed:', e);
      }
    }

    // ── Resize handler for paged mode ──

    window.addEventListener('resize', function() {
      if (isPaged) applyPageLayout();
    });

    // ── Init ──
    render();
  </script>
</body>
</html>
