# BSE textbook v3 ingest eval topics — verify Agent 是否找得到 BSE 內容
#
# Used by:
#   python -m scripts.eval_bse_kb_search        # Layer 1 only (filesystem)
#   python -m scripts.eval_bse_kb_search --with-hybrid  # Layer 1 + 2
#
# Each topic represents a Real Question 修修可能會問 about biochemistry/exercise.
# expected_concept_slugs / expected_source_pages list the **filesystem** entries
# that *should* exist in the live vault for the query to be answerable.
# ground_truth_paths is the same set in vault-relative form, used by the
# hybrid retrieval recall check (substring match, mirrors bench_kb_search.py
# convention).
#
# Topic selection covers the breadth of BSE 11 chapters:
#   ch1 energy systems / ch3 biochemical concepts / ch5 carbs / ch6 lipids
#   ch7 metabolic regulation / ch9 HIE / ch10 endurance / ch11 intermittent

