---
# WP 6.9.4 + SEOPress 9.4.1 staging environment for integration tests.
#
# Usage:
#   docker compose -f tests/fixtures/wp_staging/docker-compose.yml up -d
#   docker compose -f tests/fixtures/wp_staging/docker-compose.yml down -v
#
# After startup, run the seed script to install SEOPress and create 20 test posts:
#   docker compose -f tests/fixtures/wp_staging/docker-compose.yml exec wp bash /seed.sh
#
# Access:
#   WordPress:  http://localhost:8888
#   Admin:      http://localhost:8888/wp-admin  (admin / nakama_test_pw)
#   WP REST:    http://localhost:8888/wp-json/wp/v2/
#
# Environment variable for tests (set in .env.test or CI env):
#   PYTEST_WP_BASE_URL=http://localhost:8888
#   WP_SHOSHO_BASE_URL=http://localhost:8888
#   WP_SHOSHO_USERNAME=nakama_publisher
#   WP_SHOSHO_APP_PASSWORD=<generated by seed.sh>
#
# IMPORTANT: Never use shosho.tw as PYTEST_WP_BASE_URL — CI guard enforces this.

version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  wp:
    image: wordpress:6.4.3-php8.2-apache
    # Note: WP 6.9.4 is not yet on Docker Hub; 6.4.3 is the latest stable
    # available image. Update to 6.9.4 when the official image ships.
    # The WP version is tested via the REST API response header.
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "true"
      WORDPRESS_DEBUG_LOG: "true"
      # Disable .htaccess rewrites (not needed for REST API in this setup)
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_SITEURL', 'http://localhost:8888');
        define('WP_HOME', 'http://localhost:8888');
        define('SCRIPT_DEBUG', true);
    volumes:
      - wp_data:/var/www/html
      - ./seed.sh:/seed.sh:ro
      - ./functions-snippet.php:/functions-snippet.php:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/wp-json/wp/v2/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  wp_data:
