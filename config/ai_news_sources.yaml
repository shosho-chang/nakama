# Franky AI news digest — sources（Slice A 官方 blog + Slice B GitHub releases）
#
# 加 source 直接 append。失敗 feed 會 log warning 但不擋整批。
# scout_seen source key = "ai_news_blog"，dedup 用 entry.id (RSS GUID)
# fallback 到 sha256(url)。
#
# 已驗證（Slice A 2026-04-26 dry-run smoke）：以下 RSS/atom feed 全回 200。
#
# 不在清單的 publishers（HTML scrape 路徑處理）：
#   - Anthropic /news — 沒官方 RSS（/news/rss.xml /news/feed /research/rss.xml 全 404）
#     → 走 agents/franky/news/anthropic_html.py（Slice B）
#   - Meta AI blog — RSS endpoint malformed
#   - vLLM blog — 沒 RSS（blog 是純 HTML）
#   - LangChain blog — RSS malformed（已改用 changelog feed 替代）
#   - xAI / Mistral — 沒 RSS 或 datacenter IP block
#   - arxiv cs.AI — 暫不收（每日 200+ paper，會把 curate prompt 衝爆；PubMed 已涵蓋 paper 流）

feeds:
  # ---- 官方 blog RSS（Slice A） ----
  - name: openai_news
    url: https://openai.com/news/rss.xml
    publisher: OpenAI
  - name: google_research
    url: https://research.google/blog/rss/
    publisher: Google Research
  - name: deepmind
    url: https://deepmind.google/blog/rss.xml
    publisher: Google DeepMind
  - name: huggingface
    url: https://huggingface.co/blog/feed.xml
    publisher: Hugging Face
  - name: simon_willison
    url: https://simonwillison.net/atom/everything/
    publisher: Simon Willison
  - name: latent_space
    url: https://www.latent.space/feed
    publisher: Latent Space
  - name: langchain_changelog
    url: https://changelog.langchain.com/feed.xml
    publisher: LangChain Changelog
  - name: together_ai
    url: https://www.together.ai/blog/rss.xml
    publisher: Together AI

  # ---- GitHub releases atom（Slice B）— 4 個 high-signal repo ----
  # 不收 transformers/diffusers 全套，避免每週 10+ minor release 衝爆 curate prompt。
  - name: github_vllm
    url: https://github.com/vllm-project/vllm/releases.atom
    publisher: GitHub vllm-project/vllm
  - name: github_llama_cpp
    url: https://github.com/ggerganov/llama.cpp/releases.atom
    publisher: GitHub ggerganov/llama.cpp
  - name: github_transformers
    url: https://github.com/huggingface/transformers/releases.atom
    publisher: GitHub huggingface/transformers
  - name: github_langchain
    url: https://github.com/langchain-ai/langchain/releases.atom
    publisher: GitHub langchain-ai/langchain
